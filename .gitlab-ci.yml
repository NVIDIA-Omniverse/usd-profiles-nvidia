include:
  - project: 'omniverse/devplat/gitlab/templates/runners'
    file: 'modules/include.yml'
    ref: v2_latest
  - project: 'omniverse/sectools/vault'
    file:
      - 'templates/v3/linux/packman_s3.gitlab-ci.yml'
      - 'templates/v3/linux/artifactory.gitlab-ci.yml'

.default-rules:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_REF_PROTECTED == "true"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "parent_pipeline"
    - if: $CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "web"

workflow:
  rules:
    - !reference [.default-rules, rules]

stages:
  - check
  - build
  - test
  - deploy

# ==============================================================================================================
# Common Templates
# ==============================================================================================================

.repo-artifacts:
  artifacts:
    when: always
    expire_in: 2 weeks
    paths:
      - _repo/repo.log
      - _repo/repolog*.txt


.release-rules:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - if: $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "parent_pipeline"
      when: never
    - if: $CI_COMMIT_REF_PROTECTED == "true"
      changes:
        - VERSION.md

# ==============================================================================================================
# Pre-build Checks
# ==============================================================================================================

check-lint:
  stage: check
  extends:
    - .repo-artifacts
    - .ipp_lnx_x86_64_cpu_micro
  allow_failure: false
  needs: []
  script:
    - |
      if ! ./repo.sh lint --help &> /dev/null
      then
          echo -e "${RED}repo_lint is not installed${RED_RESET}"
          exit 1
      fi
    - |
      if [[ "$CI_PIPELINE_SOURCE" == "merge_request_event" ]]
      then
        echo "Lint the commits \"${CI_MERGE_REQUEST_DIFF_BASE_SHA}..${CI_COMMIT_SHA}\""
        while ! git log | grep "${CI_MERGE_REQUEST_DIFF_BASE_SHA}"; do
          git fetch --deepen=3
        done
      fi
    - ./repo.sh lint all -m

check-version:
  stage: check
  extends:
    - .ipp_lnx_x86_64_cpu_micro
  needs: []
  script:
    - echo "VERSION=v$(cat VERSION.md)" > dotenv.env
    - echo "VERSION_NUMBER=$(cat VERSION.md)" >> dotenv.env
    - cat dotenv.env
  artifacts:
    reports:
      dotenv: dotenv.env

# ==============================================================================================================
# Pip Package Builds
# ==============================================================================================================

build-pip:
  stage: build
  needs: []
  extends:
    - .ipp_lnx_x86_64_cpu_medium
  script:
    - ./repo.sh uv -- build -o dist
  artifacts:
    paths:
      - dist

test-pip:
  stage: test
  extends:
    - .ipp_lnx_x86_64_cpu_medium
  needs:
    - job: build-pip
      artifacts: true
  script:
    - ./repo.sh uv -- run --with ./dist/nvidia_usd_profiles-*.whl python -m unittest discover -s tests

# ==============================================================================================================
# Publish Jobs
# ==============================================================================================================


publish-pip-artifactory:
  stage: deploy
  extends:
    - .ipp_lnx_x86_64_cpu_micro
    - .osec:vault:v3:prod_token_job
  needs:
    - job: build-pip
      artifacts: true
    - job: test-pip
      artifacts: false
  before_script:
    - !reference [.osec:vault:v3:linux, artifactory:perform_vault_requests]
  variables:
    ARTIFACTORY_URL: https://urm.nvidia.com/artifactory/api/pypi/ct-omniverse-pypi
  script:
    - ./repo.sh uv -- publish --publish-url $ARTIFACTORY_URL --username $ARTIFACTORY_USERNAME --password $ARTIFACTORY_KEY dist/*.whl
  rules:
    - if: $CI_COMMIT_TAG

publish-pip-kitmaker:
  stage: deploy
  extends:
    - .ipp_lnx_x86_64_cpu_micro
  needs:
    - job: build-pip
      artifacts: true
    - job: publish-pip-artifactory
      artifacts: false
  script:
    - ./repo.sh uv -- run tools/ci/publish_wheel.py --wheel-dir dist
  manual_confirmation: "This will upload the wheel externally, are you sure you want to proceed?"
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
      allow_failure: true

# ==============================================================================================================
# Release Jobs
# ==============================================================================================================

release_job:
  stage: deploy
  extends:
    - .ipp_lnx_x86_64_cpu_micro
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: check-version
      artifacts: true
    - job: test-pip
      artifacts: false
  script:
    - echo "Creating release"
  release:
    name: 'NVIDIA USD Profiles ${VERSION}'
    description: CHANGELOG.md
    tag_name: '${VERSION}'
    ref: '$CI_COMMIT_SHA'
  rules:
    - !reference [.release-rules, rules]
