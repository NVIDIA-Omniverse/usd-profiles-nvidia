include:
  - project: 'omniverse/devplat/gitlab/templates/common/compliance'
    file: 'modules/omniverse-repo-compliance.gitlab-ci.yml'
    ref: v1_latest
  - project: 'omniverse/devplat/gitlab/templates/runners'
    file: 'modules/include.yml'
    ref: v3_latest
  - project: 'omniverse/sectools/vault'
    file:
      - 'templates/v3/linux/packman_s3.gitlab-ci.yml'
      - 'templates/v3/linux/artifactory.gitlab-ci.yml'
  - project: 'omniverse/devplat/gitlab/templates/common/github-mirror-control'
    file: 'templates/candidate-pipeline.yml'
    ref: v1_latest

variables:
  MIRROR_REPO_ID: "usd-profiles-nvidia"
  OSEC_CHECKMARX_ENABLED: false
  OSEC_SONARQUBE_ENABLED: true
  SONARQUBE_PROJECT_KEY: "SimTech_Omniverse_Omniverse_omniverse-usd-rels-usd-profiles-nvidia"

.default-rules:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_REF_PROTECTED == "true"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "parent_pipeline"
    - if: $CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "web"

workflow:
  rules:
    - !reference [.default-rules, rules]

stages:
  - check
  - build
  - test
  - deploy

# ==============================================================================================================
# Common Templates
# ==============================================================================================================

.repo-artifacts:
  artifacts:
    when: always
    expire_in: 2 weeks
    paths:
      - _repo/repo.log
      - _repo/repolog*.txt

.release-rules:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - if: $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "parent_pipeline"
      when: never
    - if: $CI_COMMIT_REF_PROTECTED == "true"
      changes:
        - VERSION

# ==============================================================================================================
# Pre-build Checks
# ==============================================================================================================

check-lint:
  stage: check
  extends:
    - .repo-artifacts
    - .ipp_lnx_x86_64_cpu_micro
  allow_failure: false
  needs: []
  script:
    - |
      if ! ./repo.sh lint --help &> /dev/null
      then
          echo -e "${RED}repo_lint is not installed${RED_RESET}"
          exit 1
      fi
    - |
      if [[ "$CI_PIPELINE_SOURCE" == "merge_request_event" ]]
      then
        echo "Lint the commits \"${CI_MERGE_REQUEST_DIFF_BASE_SHA}..${CI_COMMIT_SHA}\""
        while ! git log | grep "${CI_MERGE_REQUEST_DIFF_BASE_SHA}"; do
          git fetch --deepen=3
        done
      fi
    - ./repo.sh lint all -m

check-version:
  stage: check
  extends:
    - .ipp_lnx_x86_64_cpu_micro
  needs: []
  script:
    - echo "VERSION=v$(cat VERSION)" > dotenv.env
    - echo "VERSION_NUMBER=$(cat VERSION)" >> dotenv.env
    - cat dotenv.env
  artifacts:
    reports:
      dotenv: dotenv.env

# ==============================================================================================================
# Pip Package Builds
# ==============================================================================================================

build-pip:
  stage: build
  needs: []
  extends:
    - .ipp_lnx_x86_64_cpu_medium
  script:
    - ./repo.sh uv -- build -o dist
  artifacts:
    paths:
      - dist

# ==============================================================================================================
# Test Jobs
# ==============================================================================================================

osec:sonarqube:
  variables:
    SONAR_EXCLUSIONS: "_build/**,_repo/**,tools/**"

test-pip:
  stage: test
  extends:
    - .ipp_lnx_x86_64_cpu_medium
  needs:
    - job: build-pip
      artifacts: true
  script:
    - ./repo.sh uv -- run --no-project --with ./dist/usd_profiles_nvidia-*.whl --with "sphinx>=7.2.6" --with "myst-parser>=4.0.0" python -m unittest discover -s tests

test-coverage:
  stage: test
  extends:
    - .ipp_lnx_x86_64_cpu_medium
  needs: []
  script:
    - |
      set -o pipefail
      ./repo.sh uv -- run \
        --with coverage \
        --with "sphinx>=7.2.6" \
        --with "myst-parser>=4.0.0" \
        --with-editable . \
        coverage run \
          --source=src \
          --omit="src/usd_profiles_nvidia/capabilities/*" \
          -m unittest discover -s tests
      ./repo.sh uv -- run --with coverage coverage report
      ./repo.sh uv -- run --with coverage coverage xml -o coverage.xml
  coverage: '/^TOTAL.*\s+(\d+(?:\.\d+)?%)$/'
  artifacts:
    when: always
    paths:
      - coverage.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

test-skills-nvbase:
  stage: test
  extends:
    - .ipp_lnx_x86_64_cpu_medium
  needs: []
  script:
    - mkdir -p reports/nvbase
    - >
      ./repo.sh uv -- run
      --no-project
      --python 3.12
      --index https://urm.nvidia.com/artifactory/api/pypi/nv-shared-pypi/simple
      --with nv-base
      nv-base validate .
      --no-dedup
      --external
      --type skill
      -r cli html
      -o reports/nvbase
  artifacts:
    when: always
    expire_in: 2 weeks
    paths:
      - reports/nvbase/

# ==============================================================================================================
# Publish Jobs
# ==============================================================================================================


publish-pip-artifactory:
  stage: deploy
  extends:
    - .ipp_lnx_x86_64_cpu_micro
    - .osec:vault:v3:prod_token_job
  needs:
    - job: build-pip
      artifacts: true
    - job: test-pip
      artifacts: false
    - job: test-coverage
      artifacts: false
  before_script:
    - !reference [.osec:vault:v3:linux, artifactory:perform_vault_requests]
  variables:
    ARTIFACTORY_URL: https://urm.nvidia.com/artifactory/api/pypi/ct-omniverse-pypi
  script:
    - ./repo.sh uv -- publish --publish-url $ARTIFACTORY_URL --username $ARTIFACTORY_USERNAME --password $ARTIFACTORY_KEY dist/*.whl
  rules:
    - if: $CI_COMMIT_TAG

publish-pip-kitmaker:
  stage: deploy
  extends:
    - .ipp_lnx_x86_64_cpu_micro
  needs:
    - job: build-pip
      artifacts: true
    - job: publish-pip-artifactory
      artifacts: false
  script:
    - ./repo.sh uv -- run tools/ci/publish_wheel.py --wheel-dir dist
  manual_confirmation: "This will upload the wheel externally, are you sure you want to proceed?"
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
      allow_failure: true

# ==============================================================================================================
# Release Jobs
# ==============================================================================================================

release_job:
  stage: deploy
  extends:
    - .ipp_lnx_x86_64_cpu_micro
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: check-version
      artifacts: true
    - job: test-pip
      artifacts: false
    - job: test-coverage
      artifacts: false
  script:
    - echo "Creating release"
  release:
    name: 'USD Profiles NVIDIA ${VERSION}'
    description: CHANGELOG.md
    tag_name: '${VERSION}'
    ref: '$CI_COMMIT_SHA'
  rules:
    - !reference [.release-rules, rules]
