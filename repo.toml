########################################################################################################################
# Repo tool base settings
########################################################################################################################

[repo]
logging = "warn"

# Reposiory Name. It is used for solution name and final package name
name = "usd-profiles-nvidia"
repo_url = "https://gitlab-master.nvidia.com/omniverse/usd-rels/usd-profiles-nvidia"

[repo.folders]
version_file = "${root}/VERSION.md"

[repo.python_executable]
packman_package_name = "python"
packman_package_version = "3.11.10+nv3-${platform}"
packman_link_path = "${root}/_repo/deps/python"
python_executable_path = "python${exe_ext}"

########################################################################################################################
# Formatting
########################################################################################################################

[repo_format]
license_preamble = '''
SPDX-FileCopyrightText: Copyright (c) {years} NVIDIA CORPORATION & AFFILIATES. All rights reserved.
SPDX-License-Identifier: Apache-2.0
'''
license_text = ""

[repo_format.cpp]
files.include = [
]
files.exclude = [
    "**"
]

[repo_format.python]
maintain_legal_blurbs = true
files.include = [
    "**"
]
files.exclude."++" = [
    "venv/*",
    "tools/*",
    "specs/*",
]

########################################################################################################################
# Linting
########################################################################################################################

[repo_lint.flake8]
enabled = false

[repo_lint.ruff]
enabled = true
config = "${root}/ruff.toml"
files.include = [
    "src/**/*.py",
    "tests/**/*.py",
]
files.exclude."++" = [
    "src/usd_profiles_nvidia/capabilities/*",
]
